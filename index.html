<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#111111">
    <meta name="background-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Sultan47</title>
    <style>
    :root { --black: #000000; --white: #ffffff; }

    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action:none; font-family:monospace; }
    #app { height:100vh; display:flex; flex-direction:column; position:relative; }
    #frame {
        position:relative; flex-grow:1;
        border:20px double #ff0044; border-radius:6px;
        box-shadow:inset 0 0 40px rgba(255,255,255,0.15);
        overflow:hidden; background:#000;
        transition:border-color 0.4s ease;
        touch-action:none;
    }
    canvas { display:block; width:100%; height:100%; touch-action:none; }

    #ui {
        height:160px; display:flex; flex-direction:column; justify-content:center; align-items:center;
        background:rgba(10,10,10,0.95); border-top:2px solid #8a2be2;
        box-shadow:0 -20px 30px #8a2be2; padding:12px 0; gap:12px;
        border: 4px double #444; border-radius:12px 12px 0 0;
    }
    .button-row {
        display:flex; justify-content:space-around; width:100%; max-width:420px; gap:10px; padding:0 16px;
    }
    .b {
        width:60px; height:60px; border-radius:50%;
        background:#0a0a0a; color:#fff; font-size:16px; line-height:60px; text-align:center;
        transition:all 0.35s ease; box-shadow:0 0 20px currentColor, inset 0 0 14px rgba(0,0,0,0.9);
        position:relative; border:1px double transparent; touch-action:manipulation;
    }
    .b::before {
        content:''; position:absolute; inset:-8px; border-radius:50%;
        border:4px double transparent; pointer-events:none; opacity:0.7;
    }
    .b.active {
        transform:scale(1.25) rotate(1deg);
        box-shadow:0 0 50px 35px currentColor, inset 0 0 25px currentColor !important;
    }
    .b.active::before { opacity:1; animation:buttonPulse 1.4s infinite; }
    @keyframes buttonPulse { 0%,100% { transform:scale(1); opacity:0.8; } 50% { transform:scale(1.12); opacity:1; } }

    #btn0 { color:#c8102e; border-color:#c8102e; }
    #btn1 { color:#39ff14; border-color:#39ff14; }
    #btn2 { color:#89cff0; border-color:#89cff0; }
    #btn3 { color:#ffef00; border-color:#ffef00; }
    #btn4 { color:#b026ff; border-color:#b026ff; }
    #btnColor { color:#ffffff; border-color:#ffffff; }
    #btnInstall { color:#00ffff; border-color:#00ffff; }

    /* ────────────────────────────────────────────────
       SMOOTH SPLASH FADE-OUT
    ──────────────────────────────────────────────── */
    #splash-layer {
        background:url('assets/bg/333.jpg') center/cover;
        position:fixed; inset:0; z-index:9999;
        display:flex; align-items:center; justify-content:center;
        transition: opacity 1.4s ease-out, transform 1.4s ease-out;
        opacity:1;
        transform: translateY(0) scale(1);
        pointer-events:auto;
    }
    #splash-layer.fade-out {
        opacity:0;
        transform: translateY(-30%) scale(0.92);
        pointer-events:none;
    }
    </style>
</head>
<body>
    <div></div>
    <div id="splash-layer">
      <button id="install-button">🦫 Install</button>
        <div></div>
    
        <div id="app">
        <div id="frame"><canvas id="canvas"></canvas></div>

        <div id="ui">
            <div class="button-row">
                <button class="b active" id="btn0">👻</button>
                <button class="b" id="btn1">🌶️</button>
                <button class="b" id="btn2">🤯</button>
                <button class="b" id="btn3">👑</button>
                <button class="b" id="btn4">😎</button>
                <button class="b" id="btnColor">🌈</button>
                
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.min.js"></script>

    <script id="vShader" type="x-shader/x-vertex">
        varying vec2 vUv; varying float vDist; uniform float time;
        void main() {
            vUv = uv;
            vec3 pos = position;
            pos += normal * sin(time * 2.0 + position.y * 0.5) * 0.3;
            vDist = length(pos);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    </script>

    <script id="fShader" type="x-shader/x-fragment">
        uniform float time; uniform float glow; uniform float bass; uniform float mid; uniform float high; 
        uniform sampler2D tex; varying vec2 vUv; varying float vDist;
        
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
        
        float noise(vec2 v) {
            const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v - i + dot(i, C.xx);
            vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
            i = mod289(i);
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ; m = m*m ;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 a0 = x - floor(x + 0.5);
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
            vec3 g; g.x = a0.x * x0.x + h.x * x0.y; g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }
        
        void main() { 
            vec2 uv = vUv;
            float n = noise(uv * 8.0 + time * 0.3);
            uv += n * 0.008 * (bass + 0.3);
            uv.x += sin(time * 3.0 + uv.y * 10.0) * 0.006 * mid;
            uv.y += cos(time * 2.5 + uv.x * 8.0) * 0.005 * high;
            
            vec4 c = texture2D(tex, uv);
            vec3 col = c.rgb;
            col.r += bass * 0.4; col.g += mid * 0.3; col.b += high * 0.5;
            col = clamp(col, 0.0, 1.0);
            
            float glowFalloff = 1.0 - smoothstep(0.2, 0.8, vDist / 30.0);
            gl_FragColor = vec4(col * (glow * glowFalloff), c.a * glowFalloff); 
        }
    </script>

    <script>
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.setSize(window.innerWidth, window.innerHeight - 160);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight - 160), 0.1, 1000);
        camera.position.z = 70;

        const loader = new THREE.TextureLoader();

        const uniforms = { time:{value:0}, glow:{value:2.0}, bass:{value:0}, mid:{value:0}, high:{value:0}, tex:{value:loader.load('assets/core/a.jpg')} };
        const mainCore = new THREE.Mesh(new THREE.SphereGeometry(18, 128, 128), 
            new THREE.ShaderMaterial({ uniforms, vertexShader: document.getElementById('vShader').textContent, fragmentShader: document.getElementById('fShader').textContent }));
        scene.add(mainCore);

        let spawnedCores = [];
        class SpawnedCore {
            constructor() {
                this.mesh = mainCore.clone();
                this.mesh.material = this.mesh.material.clone();
                this.mesh.scale.setScalar(0.45);
            }
            init() {
                this.mesh.position.set(0,0,0);
                scene.add(this.mesh);
                this.life = this.maxLife = 28 + Math.random() * 12;
                this.baseScale = 0.45;
                this.angle = Math.random() * Math.PI * 2;
                this.maxRadius = 46 + Math.random() * 10;
                this.orbitSpeed = 1.6;
                this.phaseOffset = Math.random() * Math.PI;
            }
            update(delta) {
                this.life -= delta;
                if (this.life <= 0) { scene.remove(this.mesh); return false; }

                const p = this.life / this.maxLife;
                const radius = this.maxRadius * Math.sin(p * Math.PI);
                const bassBoost = uniforms.bass.value * 4.5;

                this.angle += delta * (this.orbitSpeed + bassBoost);

                this.mesh.position.x = Math.cos(this.angle) * radius;
                this.mesh.position.y = Math.sin(this.angle * 0.72) * radius * 0.62;
                this.mesh.position.z = Math.cos(this.angle * 0.35) * 9;

                const pulse = 0.65 + 0.7 * Math.sin(p * Math.PI * 6 + uniforms.bass.value * 8);
                const finalScale = Math.min(this.baseScale * pulse, 0.5);
                this.mesh.scale.setScalar(finalScale);

                return true;
            }
        }

        function clearAllCores() { spawnedCores.forEach(c => scene.remove(c.mesh)); spawnedCores = []; }
        function spawnMiniCores(count = 8) {
            for (let i = 0; i < count; i++) {
                const c = new SpawnedCore();
                c.init();
                spawnedCores.push(c);
            }
        }
        function syncMiniTextures() {
            spawnedCores.forEach(c => c.mesh.material.uniforms.tex.value = uniforms.tex.value);
        }

        let currentAudio = null, audioContext = null, analyser = null, intervalId = null;

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.65;
        }

        function updateAudio() {
            if (!analyser) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            let bass = 0, mid = 0, high = 0;
            for (let i = 0; i < 12; i++) bass += data[i];
            for (let i = 25; i < 95; i++) mid += data[i];
            for (let i = 160; i < 380; i++) high += data[i];

            uniforms.bass.value = (bass / (12 * 255)) ** 1.15;
            uniforms.mid.value  = (mid  / (70 * 255)) ** 1.1;
            uniforms.high.value = (high / (220 * 255)) ** 1.0;
        }

        const corePaths = [
            ['assets/core/a.jpg','assets/core/aa.jpg','assets/core/aaa.jpg','assets/core/aaaa.jpg','assets/core/aaaaa.jpg'],
            ['assets/core/b.jpg','assets/core/bb.jpg','assets/core/bbb.jpg','assets/core/bbbb.jpg','assets/core/bbbbb.jpg'],
            ['assets/core/c.jpg','assets/core/cc.jpg','assets/core/ccc.jpg','assets/core/cccc.jpg','assets/core/ccccc.jpg'],
            ['assets/core/d.jpeg','assets/core/dd.jpeg','assets/core/ddd.jpeg','assets/core/dddd.jpeg','assets/core/ddddd.jpeg'],
            ['assets/core/e.jpeg','assets/core/ee.jpeg','assets/core/eee.jpeg','assets/core/eeee.jpeg','assets/core/eeeee.jpeg']
        ];
        const bgPaths = [
            ['assets/bg/1.jpg','assets/bg/11.jpg','assets/bg/111.jpg','assets/bg/1111.jpg','assets/bg/11111.jpg'],
            ['assets/bg/2.jpg','assets/bg/22.jpg','assets/bg/222.jpg','assets/bg/2222.jpg','assets/bg/22222.jpg'],
            ['assets/bg/3.jpg','assets/bg/33.jpg','assets/bg/333.jpg','assets/bg/3333.jpg','assets/bg/33333.jpg'],
            ['assets/bg/4.jpg','assets/bg/44.jpg','assets/bg/444.jpg','assets/bg/4444.jpeg','assets/bg/44444.jpeg'],
            ['assets/bg/5.jpeg','assets/bg/55.jpeg','assets/bg/555.jpeg','assets/bg/5555.jpeg','assets/bg/55555.jpeg']
        ];
        const audioFiles = ['1.mp3','2.mp3','3.mp3','4.mp3','5.mp3'];

        let currentStep = 0, currentTrack = 0;

        function cycle(idx) {
            initAudio();
            if (audioContext.state !== 'running') audioContext.resume();

            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (intervalId) clearInterval(intervalId);

            currentTrack = idx;
            currentAudio = new Audio(audioFiles[idx]);
            currentAudio.crossOrigin = "anonymous";
            const source = audioContext.createMediaElementSource(currentAudio);
            source.connect(analyser);
            currentAudio.play().catch(() => {});

            currentStep = 0;
            uniforms.tex.value = loader.load(corePaths[idx][0]);
            scene.background = loader.load(bgPaths[idx][0]);
            syncMiniTextures();

            clearAllCores();
            spawnMiniCores(8);

            intervalId = setInterval(() => {
                currentStep = (currentStep + 1) % 5;
                uniforms.tex.value = loader.load(corePaths[idx][currentStep]);
                scene.background = loader.load(bgPaths[idx][currentStep]);
                syncMiniTextures();
            }, 10000);

            document.querySelectorAll('.b').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn${idx}`).classList.add('active');
        }

        let colorIndex = 0;
        const borderColors = ['#ff0044','#39ff14','#89cff0','#ffef00','#b026ff','#00ffff','#ff00ff','#ffff00','#00ff88','#ff8800','#8800ff','#ff0088','#0088ff','#88ff00','#ffaa00','#aaff00','#00aaff','#aa00ff','#ffaaff','#aaffaa','#ffcc00','#00ffcc','#cc00ff','#ff00cc','#88ffff'];
        function cycleBorder() {
            colorIndex = (colorIndex + 1) % borderColors.length;
            document.getElementById('frame').style.borderColor = borderColors[colorIndex];
        }

        let deferredPrompt = null;
        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(({ outcome }) => {
                    if (outcome === 'accepted') {
                        const splash = document.getElementById('splash-layer');
                        if (splash) {
                            splash.classList.add('fade-out');
                            setTimeout(() => splash.remove(), 1600);
                        }
                    }
                    deferredPrompt = null;
                });
            } else {
                alert("Tap again or refresh — install ready!");
            }
        }

        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
        });

        // Auto-fade if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            const splash = document.getElementById('splash-layer');
            if (splash) {
                splash.classList.add('fade-out');
                setTimeout(() => splash.remove(), 1600);
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const initialTrack = parseInt(urlParams.get('track')) || 0;

        let lastTime = 0;
        let mainOrbit = 0;

        function animate(time = 0) {
            requestAnimationFrame(animate);
            const delta = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            uniforms.time.value = time * 0.001;

            mainOrbit += 0.0018;
            mainCore.position.x = Math.sin(mainOrbit) * 11;
            mainCore.position.y = Math.cos(mainOrbit * 0.75) * 7;
            mainCore.rotation.y += 0.0038;
            mainCore.rotation.x += 0.0011;

            const bassPulse = 0.9 + uniforms.bass.value * 0.65;
            mainCore.scale.setScalar(Math.max(0.85, Math.min(1.35, bassPulse)));

            updateAudio();

            for (let i = spawnedCores.length - 1; i >= 0; i--) {
                if (!spawnedCores[i].update(delta)) spawnedCores.splice(i, 1);
            }

            if (spawnedCores.length < 5) spawnMiniCores(3);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight - 160);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 160);
        });

        const frame = document.getElementById('frame');
        frame.addEventListener('pointerdown', () => spawnMiniCores(6), { passive: true });

        function addButtonTap(id, action) {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener('pointerdown', e => {
                e.preventDefault();
                action();
                el.classList.add('active');
            }, { passive: false });
            el.addEventListener('pointerup pointercancel pointerleave', () => el.classList.remove('active'));
        }

        addButtonTap('btn0', () => cycle(0));
        addButtonTap('btn1', () => cycle(1));
        addButtonTap('btn2', () => cycle(2));
        addButtonTap('btn3', () => cycle(3));
        addButtonTap('btn4', () => cycle(4));
        addButtonTap('btnColor', cycleBorder);
    

        const splashBtn = document.getElementById('install-button');
        if (splashBtn) addButtonTap('install-button', installPWA);

        // Startup
        uniforms.tex.value = loader.load('assets/core/a.jpg');
        scene.background = loader.load('assets/bg/1.jpg');
        spawnMiniCores(8);
        animate();

        setTimeout(() => cycle(initialTrack), 800);
//
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/Sultan47/sw.js', { scope: '/Sultan47/' })
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.error('Service Worker failed', err));
}
    </script>
</body>
</html>
