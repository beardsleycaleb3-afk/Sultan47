<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Sultan47</title>
    <style>
    :root { --black: #000000; --white: #ffffff; }
    body { margin:0; padding:0; background:#000; overflow:hidden; touch-action:none; font-family: monospace; }
    #app { height:100vh; display:flex; flex-direction:column; position:relative; }
    
    /* Thin top/bottom bars + UI row — all share the double border look */
    #top-bar, #bottom-bar, #ui {
        background: rgba(10,10,10,0.95);
        border-left: 20px double #ff0044;
        border-right: 20px double #ff0044;
        color: #ffffff;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-shadow: none;
    }
    #top-bar, #bottom-bar { height: 30px; }
    #bottom-bar { justify-content: flex-end; padding-right: 20px; }
    #top-bar { font-weight: bold; letter-spacing: 2px; }

    #frame {
        position: relative; flex-grow: 1;
        border: 20px double #ff0044;
        border-radius: 6px;
        overflow: hidden; background: #000;
        transition: border-color 0.4s ease;
        box-shadow: none; /* no glow */
    }
    canvas { display:block; width:100%; height:100%; }

    #flash {
        position: absolute; inset: 0;
        background: #ff00aa; opacity: 0;
        pointer-events: none; z-index: 30;
        transition: opacity 80ms linear;
    }

    #ui {
        padding: 8px 0;
        flex-wrap: wrap;
        gap: 4px;
        justify-content: space-around;
    }

    .b {
        width: 48px; height: 48px;
        border-radius: 50%;
        background: #0a0a0a;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
        transition: transform 0.35s ease;
        box-shadow: none; /* no glow */
        border: 2px solid currentColor;
    }
    .b.active { transform: scale(1.25) rotate(1deg); box-shadow: none !important; }
    .b::before { display: none; } /* remove glow ring */
    </style>
</head>
<body>
    <div id="app">
        <div id="top-bar">©o|°®</div>

        <div id="frame">
            <canvas id="canvas"></canvas>
            <div id="flash"></div>
        </div>

        <div id="ui">
            <button class="b active" id="btn0" onclick="cycle(0)">👻</button>
            <button class="b" id="btn1" onclick="cycle(1)">🌶️</button>
            <button class="b" id="btn2" onclick="cycle(2)">🤯</button>
            <button class="b" id="btn3" onclick="cycle(3)">🦫</button>
            <button class="b" id="btn4" onclick="cycle(4)">🔥</button>
            <button class="b" id="btnColor" onclick="cycleBorder()">🌟</button>
        </div>

        <div id="bottom-bar">
            <button id="btnInstall" onclick="installPWA()" style="font-size:18px; background:transparent; border:none; color:#00ffff; cursor:pointer; padding:0 16px;">
                Install
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vShader" type="x-shader/x-vertex">
        varying vec2 vUv; varying float vDist; uniform float time;
        void main() {
            vUv = uv;
            vec3 pos = position;
            pos += normal * sin(time * 2.0 + position.y * 0.5) * 0.3;
            vDist = length(pos);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    </script>

    <script id="fShader" type="x-shader/x-fragment">
        uniform float time; uniform float glow; uniform float bass; uniform float mid; uniform float high; 
        uniform sampler2D tex; uniform float coreAlpha;
        varying vec2 vUv; varying float vDist;
        
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
        
        float noise(vec2 v) {
            const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v - i + dot(i, C.xx);
            vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;
            i = mod289(i);
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ; m = m*m ;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 a0 = x - floor(x + 0.5);
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
            vec3 g; g.x = a0.x * x0.x + h.x * x0.y; g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }
        
        void main() { 
            vec2 uv = vUv;
            float n = noise(uv * 8.0 + time * 0.3);
            uv += n * 0.006 * (bass + 0.3);
            uv.x += sin(time * 3.0 + uv.y * 10.0) * 0.004 * mid;
            uv.y += cos(time * 2.5 + uv.x * 8.0) * 0.003 * high;
            
            vec4 c = texture2D(tex, uv);
            vec3 col = c.rgb;
            col.r += bass * 0.4; col.g += mid * 0.3; col.b += high * 0.5;
            col = clamp(col, 0.0, 1.0);
            
            float glowFalloff = 1.0 - smoothstep(0.2, 0.8, vDist / 30.0);
            gl_FragColor = vec4(col * (glow * glowFalloff), c.a * coreAlpha * glowFalloff);
        }
    </script>

    <script>
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.setSize(window.innerWidth, window.innerHeight - 170); // account for bars + ui
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight - 170), 0.1, 1000);
        camera.position.z = 70;

        const loader = new THREE.TextureLoader();

        // Main core (transparent)
        const mainUniforms = {
            time: {value:0}, glow: {value:1.8}, bass: {value:0}, mid: {value:0}, high: {value:0},
            tex: {value: loader.load('assets/core/a.jpg')},
            coreAlpha: {value: 0.55}  // adjust here for more/less transparency
        };

        const mainMaterial = new THREE.ShaderMaterial({
            uniforms: mainUniforms,
            vertexShader: document.getElementById('vShader').textContent,
            fragmentShader: document.getElementById('fShader').textContent,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        const mainCore = new THREE.Mesh(new THREE.SphereGeometry(18, 128, 128), mainMaterial);
        scene.add(mainCore);

        // Mini cores (solid)
        let spawnedCores = [];
        class SpawnedCore {
            constructor() {
                this.mesh = mainCore.clone();
                this.mesh.material = mainMaterial.clone();
                this.mesh.material.transparent = false;
                this.mesh.material.blending = THREE.NormalBlending;
                this.mesh.material.depthWrite = true;
                this.mesh.material.uniforms = {...mainUniforms};
                this.mesh.material.uniforms.coreAlpha = {value: 1.0};
                this.mesh.scale.setScalar(0.45);
            }
            init() {
                this.mesh.position.set(0,0,0);
                scene.add(this.mesh);
                this.life = this.maxLife = 28 + Math.random() * 12;
                this.baseScale = 0.45;
                this.angle = Math.random() * Math.PI * 2;
                this.maxRadius = 46 + Math.random() * 10;
                this.orbitSpeed = 1.6;
            }
            update(delta) {
                this.life -= delta;
                if (this.life <= 0) { scene.remove(this.mesh); return false; }
                const p = this.life / this.maxLife;
                const radius = this.maxRadius * Math.sin(p * Math.PI);
                const bassBoost = mainUniforms.bass.value * 4.5;
                this.angle += delta * (this.orbitSpeed + bassBoost);
                this.mesh.position.x = Math.cos(this.angle) * radius;
                this.mesh.position.y = Math.sin(this.angle * 0.72) * radius * 0.62;
                this.mesh.position.z = Math.cos(this.angle * 0.35) * 9;
                const pulse = 0.65 + 0.7 * Math.sin(p * Math.PI * 6 + mainUniforms.bass.value * 8);
                this.mesh.scale.setScalar(Math.min(this.baseScale * pulse, 0.5));
                return true;
            }
        }

        function clearAllCores() { spawnedCores.forEach(c => scene.remove(c.mesh)); spawnedCores = []; }
        function spawnMiniCores(count = 8) {
            for (let i = 0; i < count; i++) {
                const c = new SpawnedCore();
                c.init();
                spawnedCores.push(c);
            }
        }
        function syncMiniTextures() {
            spawnedCores.forEach(c => c.mesh.material.uniforms.tex.value = mainUniforms.tex.value);
        }

        // Audio & beat flash
        const bpms = [90, 105, 138, 118, 76];
        let currentAudio = null, audioContext = null, analyser = null;
        let intervalId = null, beatInterval = null, beatBoost = 0;

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.65;
            analyser.connect(audioContext.destination);
        }

        function updateAudio() {
            if (!analyser) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);
            let bass = 0, mid = 0, high = 0;
            for (let i = 0; i < 12; i++) bass += data[i];
            for (let i = 25; i < 95; i++) mid += data[i];
            for (let i = 160; i < 380; i++) high += data[i];
            mainUniforms.bass.value = (bass / (12 * 255)) ** 1.15;
            mainUniforms.mid.value = (mid / (70 * 255)) ** 1.1;
            mainUniforms.high.value = (high / (220 * 255)) ** 1.0;
        }

        function triggerHardBeat() {
            document.getElementById('flash').style.opacity = '0.42';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 85);
            spawnMiniCores(12);
            beatBoost = 2.8;
        }

        const corePaths = [
            ['assets/core/a.jpg','assets/core/aa.jpg','assets/core/aaa.jpg','assets/core/aaaa.jpg','assets/core/aaaaa.jpg'],
            ['assets/core/b.jpg','assets/core/bb.jpg','assets/core/bbb.jpg','assets/core/bbbb.jpg','assets/core/bbbbb.jpg'],
            ['assets/core/c.jpg','assets/core/cc.jpg','assets/core/ccc.jpg','assets/core/cccc.jpg','assets/core/ccccc.jpg'],
            ['assets/core/d.jpeg','assets/core/dd.jpeg','assets/core/ddd.jpeg','assets/core/dddd.jpeg','assets/core/ddddd.jpeg'],
            ['assets/core/e.jpeg','assets/core/ee.jpeg','assets/core/eee.jpeg','assets/core/eeee.jpeg','assets/core/eeeee.jpeg']
        ];
        const bgPaths = [
            ['assets/bg/1.jpg','assets/bg/11.jpg','assets/bg/111.jpg','assets/bg/1111.jpg','assets/bg/11111.jpg'],
            ['assets/bg/2.jpg','assets/bg/22.jpg','assets/bg/222.jpg','assets/bg/2222.jpg','assets/bg/22222.jpg'],
            ['assets/bg/3.jpg','assets/bg/33.jpg','assets/bg/333.jpg','assets/bg/3333.jpg','assets/bg/33333.jpg'],
            ['assets/bg/4.jpg','assets/bg/44.jpg','assets/bg/444.jpg','assets/bg/4444.jpeg','assets/bg/44444.jpeg'],
            ['assets/bg/5.jpeg','assets/bg/55.jpeg','assets/bg/555.jpeg','assets/bg/5555.jpeg','assets/bg/55555.jpeg']
        ];
        const audioFiles = ['1.mp3','2.mp3','3.mp3','4.mp3','5.mp3'];

        let currentStep = 0, currentTrack = 0;

        function cycle(idx) {
            initAudio();
            if (audioContext.state !== 'running') audioContext.resume();

            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            if (intervalId) clearInterval(intervalId);
            if (beatInterval) clearInterval(beatInterval);

            currentTrack = idx;
            currentAudio = new Audio(audioFiles[idx]);
            currentAudio.crossOrigin = "anonymous";
            const source = audioContext.createMediaElementSource(currentAudio);
            source.connect(analyser);
            currentAudio.play();

            currentStep = 0;
            mainUniforms.tex.value = loader.load(corePaths[idx][0]);
            scene.background = loader.load(bgPaths[idx][0]);
            syncMiniTextures();

            clearAllCores();
            spawnMiniCores(8);

            intervalId = setInterval(() => {
                currentStep = (currentStep + 1) % 5;
                mainUniforms.tex.value = loader.load(corePaths[idx][currentStep]);
                scene.background = loader.load(bgPaths[idx][currentStep]);
                syncMiniTextures();
            }, 10000);

            const msPerBeat = 60000 / bpms[idx];
            beatInterval = setInterval(triggerHardBeat, msPerBeat);

            document.querySelectorAll('.b').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn${idx}`).classList.add('active');
        }

        // Border cycle
        let colorIndex = 0;
        const borderColors = ['#ff0044','#39ff14','#89cff0','#ffef00','#b026ff','#00ffff','#ff00ff','#ffff00','#00ff88','#ff8800','#8800ff','#ff0088','#0088ff','#88ff00','#ffaa00','#aaff00','#00aaff','#aa00ff','#ffaaff','#aaffaa','#ffcc00','#00ffcc','#cc00ff','#ff00cc','#88ffff'];
        function cycleBorder() {
            colorIndex = (colorIndex + 1) % borderColors.length;
            document.getElementById('frame').style.borderColor = borderColors[colorIndex];
            document.getElementById('top-bar').style.borderColor = borderColors[colorIndex];
            document.getElementById('bottom-bar').style.borderColor = borderColors[colorIndex];
            document.getElementById('ui').style.borderColor = borderColors[colorIndex];
        }

        // PWA install
        let deferredPrompt = null;
        function installPWA() {
            if (deferredPrompt) deferredPrompt.prompt();
            else alert("Refresh — install prompt ready!");
        }
        window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });

        // Tap for burst
        document.getElementById('frame').addEventListener('touchstart', () => spawnMiniCores(6));

        // Animation
        let lastTime = 0, mainOrbit = 0, beatBoost = 0;
        function animate(time = 0) {
            requestAnimationFrame(animate);
            const delta = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            mainUniforms.time.value = time * 0.001;

            mainOrbit += 0.0018;
            mainCore.position.x = Math.sin(mainOrbit) * 11;
            mainCore.position.y = Math.cos(mainOrbit * 0.75) * 7;
            mainCore.rotation.y += 0.0038;
            mainCore.rotation.x += 0.0011;

            const bassPulse = 0.9 + mainUniforms.bass.value * 0.65 + beatBoost * 1.1;
            mainCore.scale.setScalar(Math.max(0.85, Math.min(1.55, bassPulse)));

            updateAudio();

            for (let i = spawnedCores.length - 1; i >= 0; i--) {
                if (!spawnedCores[i].update(delta)) spawnedCores.splice(i, 1);
            }
            if (spawnedCores.length < 5) spawnMiniCores(3);

            beatBoost *= 0.84;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight - 170);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 170);
        });

        // Initial
        mainUniforms.tex.value = loader.load('assets/core/a.jpg');
        scene.background = loader.load('assets/bg/1.jpg');
        spawnMiniCores(8);
    </script>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
