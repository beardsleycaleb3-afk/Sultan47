<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Sultan47</title>
    <style>
    :root {
        --black: #000000;
        --white: #ffffff;
    }

    body {
        margin:0; padding:0; background:#000; overflow:hidden; touch-action:none;
        font-family: monospace;
    }

    #app { height:100vh; display:flex; flex-direction:column; position:relative; }

    #frame {
        position: relative; flex-grow: 1;
        border: 20px double #ff0044;
        border-radius: 6px;
        box-shadow: 
            0 0 40px 20px rgba(138,43,226,0.6),
            inset 0 0 40px rgba(255,255,255,0.15);
        overflow: hidden; background: #000;
        transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    canvas { display:block; width:100%; height:100%; }

    #ui {
        height: 100px; display:flex; justify-content:space-around; align-items:center; flex-wrap:wrap; gap:2px;
        padding:6px 0; background:rgba(10,10,10,0.95); border-top:2px solid #8a2be2;
        box-shadow:0 -20px 30px #8a2be2;
    }

    .b {
        width: 48px; height: 48px;
        border-radius: 50%;
        background: #0a0a0a;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
        transition: all 0.35s ease;
        box-shadow: 0 0 20px currentColor, inset 0 0 14px rgba(0,0,0,0.9);
        position: relative;
        border: 1px double transparent;
    }

    .b::before {
        content: '';
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 4px double transparent;
        pointer-events: none;
        opacity: 0.7;
    }

    #btn0 { color: #c8102e; border-color: #c8102e; }
    #btn0::before { border-color: #dc143c; }

    #btn1 { color: #39ff14; border-color: #39ff14; }
    #btn1::before { border-color: #228b22; }

    #btn2 { color: #89cff0; border-color: #89cff0; }
    #btn2::before { border-color: #4169e1; }

    #btn3 { color: #ffef00; border-color: #ffef00; }
    #btn3::before { border-color: #cc5500; }

    #btn4 { color: #b026ff; border-color: #b026ff; }
    #btn4::before { border-color: #9400d3; }

    .b.active {
        transform: scale(1.25) rotate(1deg);
        box-shadow: 0 0 50px 35px currentColor, inset 0 0 25px currentColor !important;
    }

    .b.active::before {
        opacity: 1;
        animation: buttonPulse 1.4s infinite;
    }

    #btn0.active \~ #frame { border-color: #c8102e; box-shadow: 0 0 40px 25px #c8102e, inset 0 0 80px rgba(200,16,46,0.4); }
    #btn1.active \~ #frame { border-color: #39ff14; box-shadow: 0 0 40px 25px #39ff14, inset 0 0 80px rgba(57,255,20,0.4); }
    #btn2.active \~ #frame { border-color: #89cff0; box-shadow: 0 0 40px 25px #89cff0, inset 0 0 80px rgba(137,207,240,0.4); }
    #btn3.active \~ #frame { border-color: #ffef00; box-shadow: 0 0 40px 25px #ffef00, inset 0 0 80px rgba(255,239,0,0.4); }
    #btn4.active \~ #frame { border-color: #b026ff; box-shadow: 0 0 40px 25px #b026ff, inset 0 0 80px rgba(176,38,255,0.4); }

    @keyframes buttonPulse {
        0%,100% { transform: scale(1); opacity: 0.8; }
        50%     { transform: scale(1.12); opacity: 1; }
    }
    </style>
</head>
<body>
    <div id="app">
        <div id="frame">
            <canvas id="canvas"></canvas>
        </div>

        <div id="ui">
            <button class="b active" id="btn0" onclick="cycle(0)">👻</button>
            <button class="b" id="btn1" onclick="cycle(1)">🌶️</button>
            <button class="b" id="btn2" onclick="cycle(2)">🤯</button>
            <button class="b" id="btn3" onclick="cycle(3)">👑</button>
            <button class="b" id="btn4" onclick="cycle(4)">😎</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        varying float vDist;
        uniform float time;
        void main() {
            vUv = uv;
            vec3 pos = position;
            pos += normal * sin(time * 2.0 + position.y * 0.5) * 0.3;
            vDist = length(pos);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    </script>
    <script id="fShader" type="x-shader/x-fragment">
        uniform float time; 
        uniform float glow; 
        uniform float bass; 
        uniform float mid; 
        uniform float high; 
        uniform sampler2D tex; 
        varying vec2 vUv;
        varying float vDist;
        
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }
        
        float noise(vec2 v) {
            const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
            vec2 i  = floor(v + dot(v, C.yy) );
            vec2 x0 = v -   i + dot(i, C.xx);
            vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
            vec4 x12 = x0.xyxy + C.xxzz;
            x12.xy -= i1;
            i = mod289(i);
            vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
            vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
            m = m*m ; m = m*m ;
            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 a0 = x - floor(x + 0.5);
            m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
            vec3 g;
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * x12.xz + h.yz * x12.yw;
            return 130.0 * dot(m, g);
        }
        
        void main() { 
            vec2 uv = vUv;
            float n = noise(uv * 8.0 + time * 0.3);
            uv += n * 0.02 * (bass + 0.3);
            uv.x += sin(time * 3.0 + uv.y * 10.0) * 0.015 * mid;
            uv.y += cos(time * 2.5 + uv.x * 8.0) * 0.012 * high;
            
            vec4 c = texture2D(tex, uv);
            vec3 col = c.rgb;
            col.r += bass * 0.4;
            col.g += mid * 0.3;
            col.b += high * 0.5;
            col = clamp(col, 0.0, 1.0);
            
            float glowFalloff = 1.0 - smoothstep(0.2, 0.8, vDist / 30.0);
            gl_FragColor = vec4(col * (glow * glowFalloff), c.a * glowFalloff); 
        }
    </script>

    <script>
        // ==================== FULLY FIXED VERSION ====================
        // Hardcoded per-button (no algebra, just explicit lists)
        // 8 mini cores spawn on press → spiral OUT to edge + back IN
        // Main core slow spins + shader pulse + audio react
        // Background + core texture swap every 10 seconds exactly as you described
        // Audio in root, everything matches your exact filenames

        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.setSize(window.innerWidth, window.innerHeight - 100);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / (window.innerHeight - 100), 0.1, 1000);
        camera.position.z = 70;

        const loader = new THREE.TextureLoader();

        // Main core + shader
        const uniforms = {
            time: {value: 0},
            glow: {value: 2.0},
            bass: {value: 0.0},
            mid: {value: 0.0},
            high: {value: 0.0},
            tex: {value: loader.load('assets/core/a.jpg')}
        };

        const mainCore = new THREE.Mesh(
            new THREE.SphereGeometry(18, 128, 128),
            new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: document.getElementById('vShader').textContent,
                fragmentShader: document.getElementById('fShader').textContent
            })
        );
        scene.add(mainCore);

        // Mini cores system (6-8 spiral out + back in with cool 3D orbit)
        let spawnedCores = [];
        class SpawnedCore {
            constructor() {
                this.mesh = mainCore.clone();
                this.mesh.material = this.mesh.material.clone();
                this.mesh.scale.setScalar(0.7);
            }
            init() {
                this.mesh.position.set(0, 0, 0);
                scene.add(this.mesh);
                this.life = this.maxLife = 22 + Math.random() * 8;
                this.baseScale = 0.7 + Math.random() * 0.6;
                this.angle = Math.random() * Math.PI * 2;
                this.maxRadius = 46 + Math.random() * 10;
                this.orbitSpeed = 2.8 + Math.random() * 3.5;
                this.phaseOffset = Math.random() * Math.PI;
            }
            update(delta) {
                this.life -= delta;
                if (this.life <= 0) {
                    scene.remove(this.mesh);
                    return false;
                }
                const p = this.life / this.maxLife;                 // 1.0 → 0.0
                const radius = this.maxRadius * Math.sin(p * Math.PI); // grow out → back in
                this.angle += delta * this.orbitSpeed;

                this.mesh.position.x = Math.cos(this.angle) * radius;
                this.mesh.position.y = Math.sin(this.angle * 0.72) * radius * 0.62;
                this.mesh.position.z = Math.cos(this.angle * 0.35) * 9; // 3D spiral depth

                const pulse = 0.6 + 0.4 * Math.sin(p * Math.PI * 5);
                this.mesh.scale.setScalar(this.baseScale * pulse);

                return true;
            }
        }

        function clearAllCores() {
            spawnedCores.forEach(c => scene.remove(c.mesh));
            spawnedCores = [];
        }

        function spawnMiniCores(count) {
            for (let i = 0; i < count; i++) {
                const c = new SpawnedCore();
                c.init();
                spawnedCores.push(c);
            }
        }

        // Audio
        let currentAudio = null;
        let audioContext = null;
        let analyser = null;
        let intervalId = null;

        function initAudio() {
            if (audioContext) return;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.65;
            analyser.connect(audioContext.destination);
        }

        function updateAudio() {
            if (!analyser) return;
            const data = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(data);

            let bass = 0, mid = 0, high = 0;
            for (let i = 0; i < 12; i++) bass += data[i];
            for (let i = 25; i < 95; i++) mid += data[i];
            for (let i = 160; i < 380; i++) high += data[i];

            uniforms.bass.value = (bass / (12 * 255)) ** 1.15;
            uniforms.mid.value  = (mid  / (70 * 255)) ** 1.1;
            uniforms.high.value = (high / (220 * 255)) ** 1.0;
        }

        // EXPLICIT HARD-CODED SEQUENCES (exactly as you asked)
        const corePaths = [
            ['assets/core/a.jpg', 'assets/core/aa.jpg', 'assets/core/aaa.jpg', 'assets/core/aaaa.jpg', 'assets/core/aaaaa.jpg'], // btn 0
            ['assets/core/b.jpg', 'assets/core/bb.jpg', 'assets/core/bbb.jpg', 'assets/core/bbbb.jpg', 'assets/core/bbbbb.jpg'], // btn 1
            ['assets/core/c.jpg', 'assets/core/cc.jpg', 'assets/core/ccc.jpg', 'assets/core/cccc.jpg', 'assets/core/ccccc.jpg'], // btn 2
            ['assets/core/d.jpeg', 'assets/core/dd.jpeg', 'assets/core/ddd.jpeg', 'assets/core/dddd.jpeg', 'assets/core/ddddd.jpeg'], // btn 3
            ['assets/core/e.jpeg', 'assets/core/ee.jpeg', 'assets/core/eee.jpeg', 'assets/core/eeee.jpeg', 'assets/core/eeeee.jpeg']  // btn 4
        ];

        const bgPaths = [
            ['assets/bg/1.jpg', 'assets/bg/11.jpg', 'assets/bg/111.jpg', 'assets/bg/1111.jpg', 'assets/bg/11111.jpg'],
            ['assets/bg/2.jpg', 'assets/bg/22.jpg', 'assets/bg/222.jpg', 'assets/bg/2222.jpg', 'assets/bg/22222.jpg'],
            ['assets/bg/3.jpg', 'assets/bg/33.jpg', 'assets/bg/333.jpg', 'assets/bg/3333.jpg', 'assets/bg/33333.jpg'],
            ['assets/bg/4.jpg', 'assets/bg/44.jpg', 'assets/bg/444.jpg', 'assets/bg/4444.jpeg', 'assets/bg/44444.jpeg'],
            ['assets/bg/5.jpeg', 'assets/bg/55.jpeg', 'assets/bg/555.jpeg', 'assets/bg/5555.jpeg', 'assets/bg/55555.jpeg']
        ];

        const audioFiles = ['1.mp3', '2.mp3', '3.mp3', '4.mp3', '5.mp3'];

        let currentStep = 0;
        let currentTrack = 0;

        function cycle(idx) {
            initAudio();
            if (audioContext.state !== 'running') audioContext.resume();

            // Stop old stuff
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            if (intervalId) clearInterval(intervalId);

            currentTrack = idx;
            currentAudio = new Audio(audioFiles[idx]);
            currentAudio.crossOrigin = "anonymous";
            const source = audioContext.createMediaElementSource(currentAudio);
            source.connect(analyser);
            currentAudio.play();

            // Immediate first frame
            currentStep = 0;
            uniforms.tex.value = loader.load(corePaths[idx][0]);
            scene.background = loader.load(bgPaths[idx][0]);

            // Spawn the 8 mini cores that spiral out and back in
            clearAllCores();
            spawnMiniCores(8);

            // 10-second hardcoded cycle (exactly what you described)
            intervalId = setInterval(() => {
                currentStep = (currentStep + 1) % 5;
                uniforms.tex.value = loader.load(corePaths[idx][currentStep]);
                scene.background = loader.load(bgPaths[idx][currentStep]);
            }, 10000);

            // UI
            document.querySelectorAll('.b').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn${idx}`).classList.add('active');
        }

        // Main animation loop
        let lastTime = 0;
        function animate(time = 0) {
            requestAnimationFrame(animate);

            const delta = Math.min((time - lastTime) / 1000, 0.05);
            lastTime = time;

            uniforms.time.value = time * 0.001;
            mainCore.rotation.y += 0.0032;
            mainCore.rotation.x += 0.0009;

            updateAudio();

            for (let i = spawnedCores.length - 1; i >= 0; i--) {
                if (!spawnedCores[i].update(delta)) {
                    spawnedCores.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }
        animate();

        // Mobile resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / (window.innerHeight - 100);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 100);
        });

        // Initial look (before any press)
        uniforms.tex.value = loader.load('assets/core/a.jpg');
        scene.background = loader.load('assets/bg/1.jpg');
    </script>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
